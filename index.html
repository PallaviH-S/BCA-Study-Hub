<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login </title>
    <style>
        body{
            font-size: 16px;
            background-color:lightgrey;
        }
        h2{
            text-align: center;
            border-bottom: 2px solid green;
        }
        form{
            width:300px ;
            background-color: #fff;
            margin:50px auto 0;
            padding: 10px 40px 40px;
            border-bottom: 2px #fff;
            border-radius :5px;
        }
        input,select{
            border:1px solid #ccc;
            padding : 10px;
            width:100%;
            box-sizing: border-box;
            border-radius:2px;
        }
        label{
            display:block;
            margin-bottom: 6px ;
        }
        div{
            padding-bottom: 12px;
        }
        .form-inline{
            border: 1px solid #ccc;
            border-radius: 2px;
            padding:8px 10px 4px;
        }
        .form-inline label,.form-inline input{
            display:inline-block;
            width:auto;
            padding-right: 15px;
        }
        input[type="submit"]{
            font-size: 20px;
            border-color: black;
            background-color: green;
            box-shadow: 0 3px 0 grey;
            color:white;
            margin-top: 10px;
            cursor:pointer;
        }
        input[type="submit"]:hover{
            background-color: darkgreen;
        }

    </style>
</head>
<body>
    <form action="Main.html" method="GET">
        <h2>Registration Form</h2>
    <div>
        
        <!--Input Candidate name-->
        <label>Candidate Name : </label>
        <input type ="text"><br>
        
        <!--input Email-->
        <label>Email Id : </label>
        <input type="text"><br>

        <!--input Mobile NO.-->
        <label>Mobile Number</label>
        <input type="tel"><br>
    
        <!--input Course-->
        <label>Course</label>
        <select name="Course">
            <option>BCA</option>
            <option>BBA</option>
            <option>B.sc</option>
            <option>B.com</option>
            <option>BA</option>
        </select>
    </div>
    <div>
        <label>Gender</label>
        <div class="form-inline">
            <label>
                <input type="radio" name="Gender" value="Male">Male
            </label>
            <label>
                <input type="radio" name="Gender" value="Female">Female
            </label>
        </div>
    </div>
    <div>
        <input type="submit" name="" value="Register">
    </div>
    </form>
    
    
</body>
</html>
